name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- AÑADE ESTE PASO AQUÍ ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Esto forzará el uso de Node 22
      # ----------------------------

      - name: Install, build, and upload
        uses: withastro/action@v3